{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card mt-4">
            <div class="card-body p-4">
                <h3 class="mb-1" style="color: #ffffff;">✏️ Edit Your Idea</h3>
                <p style="color: #a0a0b0;" class="mb-4">Costs 10 reputation points • You have {{ current_user.reputation }} pts</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label" style="color: #e0e0e0;">Title</label>
                        <input type="text" name="title" value="{{ idea.title }}"
                               class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color: #e0e0e0;">Description</label>
                        <textarea name="description" rows="5"
                                  class="form-control bg-dark text-light border-secondary" required>{{ idea.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="color: #e0e0e0;">Category</label>
                        <select name="category" class="form-select bg-dark text-light border-secondary">
                            <option {% if idea.category == 'Mobile App' %}selected{% endif %}>Mobile App</option>
                            <option {% if idea.category == 'Web Application' %}selected{% endif %}>Web Application</option>
                            <option {% if idea.category == 'SaaS' %}selected{% endif %}>SaaS</option>
                            <option {% if idea.category == 'AI Tool' %}selected{% endif %}>AI Tool</option>
                            <option {% if idea.category == 'Startup' %}selected{% endif %}>Startup</option>
                            <option {% if idea.category == 'E-Commerce' %}selected{% endif %}>E-Commerce</option>
                            <option {% if idea.category == 'Education' %}selected{% endif %}>Education</option>
                            <option {% if idea.category == 'Gaming' %}selected{% endif %}>Gaming</option>
                            <option {% if idea.category == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" style="color: #e0e0e0;">Tags</label>
                        <input type="text" name="tags" value="{{ idea.tags }}"
                               class="form-control bg-dark text-light border-secondary"
                               placeholder="e.g. python, ai, mobile">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">Update Idea (-10 pts) ✏️</button>
                        <a href="{{ url_for('ideas.idea_detail', idea_id=idea.id) }}"
                           class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
